<div class="flex flex-column align-items-center justify-content-center min-h-screen bg-gray-950 p-4">

  <div class="text-center mb-6">
    <h1 class="text-5xl font-bold text-white mb-2 tracking-tight">Panel de Control</h1>
    <p class="text-gray-400 text-lg">Bienvenido de vuelta, <span class="text-blue-500 font-bold">{{currentUser}}</span></p>
  </div>

  <div class="grid w-full max-w-70rem justify-content-center">

    <div class="col-12 lg:col-4 p-3">
      <div class="bg-gray-900 p-4 border-round-2xl shadow-8 h-full border-1 border-gray-800 flex flex-column align-items-center justify-content-center">
        <div class="text-xs font-bold text-gray-500 uppercase mb-4 w-full text-center tracking-widest">Estado de Tickets</div>

        <div class="relative flex align-items-center justify-content-center w-full" style="max-width: 180px">
          <p-chart type="doughnut" [data]="chartData" [options]="chartOptions" width="100%"></p-chart>
          <div class="absolute text-center">
            <div class="text-4xl font-bold text-white">{{stats.total}}</div>
            <div class="text-xs text-gray-500 uppercase">Total</div>
          </div>
        </div>

        <div class="w-full mt-5 flex flex-column gap-3">
          <div class="flex justify-content-between align-items-center bg-gray-950 p-2 border-round-lg">
            <span class="text-sm text-blue-400"><i class="pi pi-circle-fill mr-2"></i>Pendientes</span>
            <span class="text-white font-bold">{{stats.pendientes}}</span>
          </div>
          <div class="flex justify-content-between align-items-center bg-gray-950 p-2 border-round-lg">
            <span class="text-sm text-yellow-500"><i class="pi pi-circle-fill mr-2"></i>En Curso</span>
            <span class="text-white font-bold">{{stats.enProgreso}}</span>
          </div>
          <div class="flex justify-content-between align-items-center bg-gray-950 p-2 border-round-lg">
            <span class="text-sm text-green-500"><i class="pi pi-circle-fill mr-2"></i>Listos</span>
            <span class="text-white font-bold">{{stats.finalizados}}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 lg:col-8">
      <div class="grid">
        <div *ngFor="let group of groups" class="col-12 md:col-6 p-3">
          <div (click)="selectGroup(group.name)"
               class="p-4 border-round-2xl shadow-4 cursor-pointer hover:shadow-8 transition-all transition-duration-300 transform hover:-translate-y-2 h-full flex flex-column justify-content-between"
               [style.background]="group.color">

            <div>
              <div class="flex align-items-center justify-content-between mb-4">
                <i [class]="group.icon + ' text-4xl text-white-alpha-90'"></i>
                <i class="pi pi-arrow-right text-white-alpha-60"></i>
              </div>

              <h3 class="text-2xl font-bold text-white mb-2">{{ group.name }}</h3>
              <p class="text-white-alpha-80 text-sm line-height-3">{{ group.description }}</p>
            </div>

            <div class="mt-4 pt-3 border-top-1 border-white-alpha-20">
              <span class="text-xs uppercase tracking-widest text-white font-bold">Acceder al módulo</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
