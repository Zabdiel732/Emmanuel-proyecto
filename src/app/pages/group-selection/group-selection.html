<div class="flex flex-column align-items-center justify-content-center min-h-screen surface-ground p-4">
  <div class="text-center mb-6">
    <h1 class="text-4xl font-bold text-white mb-2">Bienvenido, Zabdiel</h1>
    <p class="text-gray-500 text-xl">Selecciona un espacio de trabajo para comenzar</p>
  </div>

  <div class="grid justify-content-center w-full lg:w-10">
    <div *ngFor="let group of groups" class="col-12 md:col-4 p-3">
      <div (click)="selectGroup(group.name)"
           class="p-4 border-round-xl shadow-4 cursor-pointer hover:shadow-8 transition-duration-300 transform hover:-translate-y-1"
           [style.background]="group.color">

        <div class="flex align-items-center justify-content-between mb-4">
          <i [class]="group.icon + ' text-3xl text-white-alpha-90'"></i>
          <i class="pi pi-arrow-right text-white-alpha-70"></i>
        </div>

        <h3 class="text-2xl font-bold text-white mb-2">{{ group.name }}</h3>
        <p class="text-white-alpha-70 line-height-3">{{ group.description }}</p>

        <div class="mt-4 pt-3 border-top-1 border-white-alpha-20 flex align-items-center">
          <span class="text-xs uppercase tracking-wider text-white-alpha-50 font-bold">Entrar al Dashboard</span>
        </div>
      </div>
    </div>
  </div>
</div>
