<div class="flex min-h-screen bg-gray-950 text-gray-100">
  <div class="w-16rem bg-gray-900 border-right-1 border-gray-800 flex flex-column h-screen sticky top-0">
    <div class="p-4 text-xl font-bold text-blue-500 uppercase">{{projectName}}</div>
    <div class="flex-grow-1 px-3 mt-4">
      <p-button label="Dashboard" icon="pi pi-home" [text]="true" styleClass="w-full text-left mb-2 text-white"></p-button>
      <p-button label="Usuarios" icon="pi pi-users" [text]="true" styleClass="w-full text-left text-gray-400"></p-button>
    </div>
    <div class="p-3 bg-gray-800 text-xs text-center text-gray-500">Versión {{version}}</div>
  </div>

  <div class="flex-grow-1 p-5 overflow-y-auto">
    <div class="flex justify-content-between align-items-center mb-5 bg-gray-900 p-4 border-round-xl shadow-4 border-left-3 border-blue-500">
      <h1 class="text-3xl font-bold m-0">Vista de Grupo: Desarrollo</h1>
      <div class="flex gap-3">
        <p-selectButton [options]="viewOptions" [(ngModel)]="selectedView" optionLabel="label" optionValue="value"></p-selectButton>
        <p-button label="Nuevo Ticket" icon="pi pi-plus" (onClick)="openCreateModal()"></p-button>
      </div>
    </div>

    <div *ngIf="selectedView === 'kanban'" class="grid" cdkDropListGroup>

      <div class="col-12 md:col-3" *ngFor="let col of [
        {label:'Pendiente', data:todo},
        {label:'En progreso', data:inProgress},
        {label:'Revisión', data:review},
        {label:'Finalizado', data:done}]">

        <div class="bg-gray-900 p-3 border-round-lg min-h-screen border-top-3 border-gray-800">
          <h4 class="text-gray-400 uppercase text-xs font-bold mb-4 text-center">{{col.label}}</h4>

          <div cdkDropList
               [cdkDropListData]="col.data"
               (cdkDropListDropped)="drop($event, col.label)"
               class="flex flex-column gap-3 min-h-20rem pb-5">

            <div *ngFor="let t of col.data"
                 cdkDrag
                 (click)="openEditModal(t)"
                 class="bg-gray-800 p-3 border-round shadow-2 cursor-move hover:surface-hover transition-all border-left-2 border-blue-500">

              <div class="font-bold mb-2 text-blue-100">{{t.title}}</div>
              <div class="flex justify-content-between align-items-center">
                <p-tag [value]="t.priority" [severity]="getPrioritySeverity(t.priority)"></p-tag>
                <span class="text-xs text-gray-500"><i class="pi pi-user mr-1"></i>{{t.assignedTo}}</span>
              </div>

              <div *cdkDragPlaceholder class="bg-gray-700 border-round h-4rem mb-3 border-2 border-dashed border-blue-500"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="selectedView === 'list'" class="surface-card p-4 border-round shadow-4 bg-gray-900">
      <p-table [value]="tickets" [rows]="10" styleClass="p-datatable-sm" [paginator]="true">
        <ng-template pTemplate="header">
          <tr>
            <th>Título</th>
            <th>Estado</th>
            <th>Prioridad</th>
            <th>Asignado</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-t>
          <tr class="hover:bg-gray-800 cursor-pointer" (click)="openEditModal(t)">
            <td>{{t.title}}</td>
            <td><p-tag [value]="t.status" severity="secondary"></p-tag></td>
            <td><p-tag [value]="t.priority" [severity]="getPrioritySeverity(t.priority)"></p-tag></td>
            <td>{{t.assignedTo}}</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>

<p-dialog [(visible)]="displayModal" [header]="ticketForm.id ? 'Detalle de Ticket' : 'Crear Ticket'" [modal]="true" [style]="{width: '500px'}" styleClass="p-fluid">
  <div class="field mb-4">
    <label class="font-bold block mb-2">Título</label>
    <input pInputText [(ngModel)]="ticketForm.title" />
  </div>
  <div class="field mb-4">
    <label class="font-bold block mb-2">Descripción</label>
    <textarea pTextarea rows="4" [(ngModel)]="ticketForm.description"></textarea>
  </div>
  <div class="grid">
    <div class="col-6">
      <label class="font-bold block mb-2">Asignado a</label>
      <input pInputText [(ngModel)]="ticketForm.assignedTo" />
    </div>
    <div class="col-6">
      <label class="font-bold block mb-2">Prioridad</label>
      <input pInputText [(ngModel)]="ticketForm.priority" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="displayModal=false"></p-button>
    <p-button label="Guardar" icon="pi pi-check" (onClick)="saveTicket()"></p-button>
  </ng-template>
</p-dialog>
