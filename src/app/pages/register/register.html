<div class="flex align-items-center justify-content-center min-h-screen surface-ground px-4 py-5">
  <p-card header="Crear Cuenta" [style]="{ width: '450px' }" class="shadow-5">
    <p class="text-gray-500 mb-4">Únete a la plataforma ERP para gestionar tu empresa.</p>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="flex flex-column gap-3">

      <div class="flex flex-column gap-2">
        <label for="fullName" class="font-bold">Nombre Completo</label>
        <span class="p-input-icon-left">
                    <i class="pi pi-user"></i>
                    <input pInputText id="fullName" formControlName="fullName" placeholder="Juan Pérez" class="w-full" />
                </span>
      </div>

      <div class="flex flex-column gap-2">
        <label for="email" class="font-bold">Correo Electrónico</label>
        <span class="p-input-icon-left">
                    <i class="pi pi-envelope"></i>
                    <input pInputText id="email" formControlName="email" placeholder="usuario@uteq.edu.mx" class="w-full" />
                </span>
      </div>

      <div class="flex flex-column gap-2">
        <label for="password" class="font-bold">Contraseña</label>
        <p-password id="password" formControlName="password"
                    [toggleMask]="true"
                    placeholder="Mínimo 6 caracteres"
                    styleClass="w-full"
                    inputStyleClass="w-full">
          <ng-template pTemplate="header">
            <h6>Elige una contraseña segura</h6>
          </ng-template>
        </p-password>
      </div>

      <div class="mt-3">
        <p-button label="Registrarse" type="submit" icon="pi pi-user-plus" class="w-full" styleClass="w-full"></p-button>
      </div>

      <div class="text-center mt-3">
        <span class="text-gray-500">¿Ya tienes una cuenta? </span>
        <a class="text-blue-500 font-bold cursor-pointer no-underline hover:underline" (click)="goToLogin()">
          Inicia Sesión
        </a>
      </div>
    </form>
  </p-card>
</div>
